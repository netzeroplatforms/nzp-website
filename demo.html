<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NZP Platform — Demo Access</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#f1f5f9;padding:20px}
.gate{max-width:420px;width:100%;background:rgba(30,41,59,.95);border:1px solid rgba(148,163,184,.2);border-radius:16px;padding:48px 40px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.logo{font-size:18px;font-weight:700;margin-bottom:4px}
.logo-sub{font-size:11px;letter-spacing:2px;color:#64748b;margin-bottom:24px}
.gate h2{font-size:16px;font-weight:600;margin-bottom:8px}
.gate p{font-size:13px;color:#94a3b8;margin-bottom:20px;line-height:1.5}
.input-row{margin-bottom:16px}
.input-row input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid rgba(148,163,184,.2);background:rgba(15,23,42,.5);color:#f1f5f9;font-size:14px;outline:none}
.input-row input:focus{border-color:#2563eb}
.input-row input::placeholder{color:#475569}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn:hover{background:#1d4ed8}
.err{margin-top:12px;font-size:12px;color:#f87171}
.creds{margin-top:16px;font-size:12px;color:#64748b;line-height:1.8}
.creds code{background:rgba(37,99,235,.15);padding:2px 8px;border-radius:4px;color:#93c5fd;font-family:monospace;font-size:12px}
</style>
</head>
<body>
<div class="gate">
  <div class="logo">Net Zero Platforms</div>
  <div class="logo-sub">SYNGAS OPTIMISATION PLATFORM</div>
  <h2>🔒 Demo Access</h2>
  <p>This is the interactive NZP gasification economics model. Enter the access code to launch the demo.</p>
  <form id="f" autocomplete="off">
    <div class="input-row">
      <input type="password" id="pw" placeholder="Demo access code" autofocus>
    </div>
    <button type="submit" class="btn">Launch Demo Platform →</button>
    <div class="err" id="err" style="display:none">⚠ Incorrect code</div>
  </form>
  <div class="creds">
    Demo: <code>mark</code> / <code>B1dge2026!</code>
  </div>
</div>
<script>
var PWD='nzp-demo-2026';
document.getElementById('f').addEventListener('submit',function(e){
  e.preventDefault();
  if(document.getElementById('pw').value===PWD){
    window.location.href='http://204.168.161.165:8080/';
  } else {
    document.getElementById('err').style.display='block';
  }
});
</script>
</body>
</html>
